<!DOCTYPE html>
<html>
<head>
<title>PKRAAJ HUB</title>

<style>
body{font-family:sans-serif;background:#f1f5f9;margin:0}
.header{background:#0f172a;color:#fff;padding:10px;text-align:center}
.search{padding:10px;text-align:center}
input{padding:8px;width:80%}
.card{background:#fff;margin:10px;padding:10px;border-radius:10px}
img{width:100%;border-radius:10px}
</style>
</head>

<body>

<div class="header">🔥 PKRAAJ HUB</div>

<div class="search">
<input type="text" id="search" placeholder="Search..." onkeyup="searchPost()">
</div>

<div id="posts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC5FXO_xlO0qXGSnGWE62GYSD9hXwcErjE",
  databaseURL: "https://mybloglikes-95f54-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db,"posts"),snap=>{
  let html="";
  snap.forEach(child=>{
    const p=child.val();

    html+=`
    <div class="card">
      <img src="${p.img || 'https://via.placeholder.com/300'}">
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
      <a href="${p.link}" target="_blank">Download</a>
    </div>`;
  });

  document.getElementById("posts").innerHTML=html;
});

// SEARCH
window.searchPost=()=>{
  let input=document.getElementById("search").value.toLowerCase();
  let cards=document.querySelectorAll(".card");

  cards.forEach(c=>{
    c.style.display=c.innerText.toLowerCase().includes(input)?"block":"none";
  });
};
</script>

</body>
</html>
