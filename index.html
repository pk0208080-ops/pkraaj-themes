<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PKRAAJ HUB | Store Admin</title>
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --light: #f8fafc; --danger: #ef4444; }
        body { margin: 0; font-family: sans-serif; background: var(--light); padding-bottom: 80px; }
        header { background: var(--dark); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; font-weight: 900; }
        
        #adminPanel { background: white; padding: 20px; border-bottom: 3px solid var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 10px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; }
        .publish-btn { width: 100%; background: #10b981; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #eee; position: relative; }
        .card-body { padding: 20px; }
        
        /* DELETE BUTTON - CLEARLY VISIBLE */
        .del-btn { 
            position: absolute; top: 10px; right: 10px; 
            background: var(--danger); color: white; border: none; 
            padding: 8px 12px; border-radius: 8px; font-size: 12px;
            font-weight: bold; cursor: pointer; z-index: 20;
        }

        .price { font-weight: 900; font-size: 1.5rem; }
        .btn-action { background: var(--primary); color: white; text-decoration: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<header>PKRAAJ HUB | ADMIN CONTROL</header>

<div id="adminPanel">
    <h3 style="margin:0 0 10px 0;">नई पोस्ट डालें</h3>
    <input type="text" id="pName" placeholder="Item Name">
    <input type="text" id="pPrice" placeholder="Price (FREE or ₹)">
    <input type="text" id="pLink" placeholder="Link">
    <textarea id="pDesc" placeholder="Description"></textarea>
    <select id="pFolder">
        <option value="themes">Themes</option>
        <option value="apps">Apps</option>
    </select>
    <button class="publish-btn" id="submitBtn">PUBLISH NOW</button>
</div>

<div class="container" id="postWrapper">
    <p style="text-align:center;">डेटा लोड हो रहा है...</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC5FXO_xlO0qXGSnGWE62GYSD9hXwcErjE",
        authDomain: "mybloglikes-95f54.firebaseapp.com",
        databaseURL: "https://mybloglikes-95f54-default-rtdb.firebaseio.com",
        projectId: "mybloglikes-95f54",
        storageBucket: "mybloglikes-95f54.firebasestorage.app",
        messagingSenderId: "458642789264",
        appId: "1:458642789264:web:3d60f9fec2f4b64224d915"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 1. UPLOAD POST
    document.getElementById('submitBtn').addEventListener('click', () => {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const link = document.getElementById('pLink').value;
        const desc = document.getElementById('pDesc').value;
        const folder = document.getElementById('pFolder').value;

        if(!name || !link) return alert("नाम और लिंक भरें!");

        push(ref(db, 'posts'), { name, price, link, desc, folder });
        alert("Published!");
        document.getElementById('pName').value = '';
    });

    // 2. SHOW POSTS & DELETE LOGIC
    onValue(ref(db, 'posts'), (snapshot) => {
        const wrapper = document.getElementById('postWrapper');
        wrapper.innerHTML = '';
        
        snapshot.forEach((child) => {
            const p = child.val();
            const key = child.key;
            
            // नया कार्ड बनाएं
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <button class="del-btn">DELETE POST</button>
                <div class="card-body">
                    <h2 style="margin:0;">${p.name || 'Undefined'}</h2>
                    <p style="color:#64748b;">${p.desc || 'No description'}</p>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="price">${p.price || '0'}</span>
                        <a href="${p.link}" target="_blank" class="btn-action">Link</a>
                    </div>
                </div>
            `;

            // डिलीट बटन पर क्लिक करने का काम
            card.querySelector('.del-btn').addEventListener('click', () => {
                if(confirm("इसे डिलीट करें?")) {
                    remove(ref(db, `posts/${key}`));
                }
            });

            wrapper.appendChild(card);
        });
    });
</script>
</body>
</html>
