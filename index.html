<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKRAAJ HUB | Secure Store</title>
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #f8fafc; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); padding-bottom: 80px; }
        
        /* Header */
        header { background: var(--dark); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; font-size: 1.4rem; padding-left: 15px; }
        .lock-btn { background: none; border: 1px solid #444; color: #666; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-right: 15px; }

        /* Admin Panels (Hidden by Default) */
        #adminForm, .admin-controls { display: none; }
        #adminForm { background: white; padding: 20px; border-bottom: 3px solid var(--primary); }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
        .pub-btn { width: 100%; background: #10b981; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Grid & Cards */
        .container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; border: 1px solid #eee; display: flex; flex-direction: column; }
        .card-img { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: white; background: var(--primary); }
        .card-body { padding: 10px; flex-grow: 1; }
        .card-title { font-size: 14px; font-weight: bold; margin: 0; color: var(--dark); height: 34px; overflow: hidden; }
        .price { font-weight: 900; color: var(--primary); margin: 8px 0; display: block; }
        .get-btn { background: var(--dark); color: white; text-decoration: none; text-align: center; padding: 10px; border-radius: 10px; font-size: 12px; font-weight: bold; display: block; }

        /* Secret Admin Controls */
        .admin-controls { position: absolute; top: 5px; right: 5px; display: flex; gap: 5px; }
        .btn-del { background: #ef4444; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }
        .btn-edit { background: #f59e0b; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }

        @media (min-width: 768px) { .container { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

<header>
    <div class="logo">PKRAAJ HUB</div>
    <button class="lock-btn" onclick="loginAdmin()">Admin Login</button>
</header>

<div id="adminForm">
    <h3 id="formTitle">नई पोस्ट जोड़ें</h3>
    <input type="hidden" id="editKey">
    <input type="text" id="pName" placeholder="नाम">
    <input type="text" id="pPrice" placeholder="कीमत (FREE/₹)">
    <input type="text" id="pLink" placeholder="डाउनलोड लिंक">
    <textarea id="pDesc" placeholder="विवरण"></textarea>
    <select id="pCat">
        <option value="themes">🎨 Themes</option>
        <option value="apps">📱 Apps</option>
    </select>
    <button class="pub-btn" id="postBtn">PUBLISH</button>
</div>

<div class="container" id="mainGrid"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC5FXO_xlO0qXGSnGWE62GYSD9hXwcErjE",
        authDomain: "mybloglikes-95f54.firebaseapp.com",
        databaseURL: "https://mybloglikes-95f54-default-rtdb.firebaseio.com",
        projectId: "mybloglikes-95f54",
        storageBucket: "mybloglikes-95f54.firebasestorage.app",
        messagingSenderId: "458642789264",
        appId: "1:458642789264:web:3d60f9fec2f4b64224d915"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let isAdmin = false;

    // --- 1. ADMIN LOGIN ---
    window.loginAdmin = () => {
        const pass = prompt("एडमिन पासवर्ड डालें:");
        if(pass === "pkraaj786") {
            isAdmin = true;
            document.getElementById('adminForm').style.display = 'block';
            alert("लॉगिन सफल! अब आप Edit/Delete कर सकते हैं।");
            loadData(); // दोबारा लोड करें ताकि बटन दिखें
        } else {
            alert("गलत पासवर्ड!");
        }
    };

    // --- 2. ADD / UPDATE POST ---
    document.getElementById('postBtn').onclick = () => {
        const key = document.getElementById('editKey').value;
        const data = {
            name: document.getElementById('pName').value,
            price: document.getElementById('pPrice').value,
            link: document.getElementById('pLink').value,
            desc: document.getElementById('pDesc').value,
            cat: document.getElementById('pCat').value
        };

        if(key) {
            update(ref(db, 'posts/' + key), data);
            document.getElementById('editKey').value = '';
            document.getElementById('formTitle').innerText = "नई पोस्ट जोड़ें";
        } else {
            push(ref(db, 'posts'), data);
        }
        alert("Done!");
    };

    // --- 3. LOAD DATA ---
    function loadData() {
        onValue(ref(db, 'posts'), (snapshot) => {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            snapshot.forEach((child) => {
                const p = child.val();
                const key = child.key;
                const controlsClass = isAdmin ? 'style="display:flex"' : 'style="display:none"';
                
                grid.innerHTML += `
                    <div class="card">
                        <div class="admin-controls" ${controlsClass}>
                            <button class="btn-edit" onclick="editPost('${key}', '${p.name}', '${p.price}', '${p.link}', '${p.desc}', '${p.cat}')">Edit</button>
                            <button class="btn-del" onclick="deletePost('${key}')">X</button>
                        </div>
                        <div class="card-img">${p.cat === 'themes' ? '🎨' : '📱'}</div>
                        <div class="card-body">
                            <h3 class="card-title">${p.name}</h3>
                            <span class="price">${p.price}</span>
                            <a href="${p.link}" target="_blank" class="get-btn">GET NOW</a>
                        </div>
                    </div>`;
            });
        });
    }

    // --- 4. ADMIN ACTIONS ---
    window.deletePost = (key) => { if(confirm("डिलीट करें?")) remove(ref(db, 'posts/' + key)); };
    
    window.editPost = (key, name, price, link, desc, cat) => {
        document.getElementById('editKey').value = key;
        document.getElementById('pName').value = name;
        document.getElementById('pPrice').value = price;
        document.getElementById('pLink').value = link;
        document.getElementById('pDesc').value = desc;
        document.getElementById('pCat').value = cat;
        document.getElementById('formTitle').innerText = "पोस्ट एडिट करें";
        window.scrollTo(0,0);
    };

    loadData();
</script>
</body>
</html>
