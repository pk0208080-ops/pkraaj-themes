    <style>
        :root { 
            --primary: #2563eb; --dark: #0f172a; --light: #f1f5f9; 
            --text: #334155; --success: #10b981; --white: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--light); padding-bottom: 90px; }
        
        /* Header */
        header { background: var(--dark); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.4rem; font-weight: 900; color: white; text-decoration: none; }
        .logo span { color: var(--primary); }

        /* FOLDER TABS (Category Switcher) */
        .tabs-container { 
            background: white; padding: 10px 5%; position: sticky; top: 55px; 
            z-index: 90; display: flex; gap: 10px; overflow-x: auto; 
            white-space: nowrap; border-bottom: 1px solid #eee;
            scrollbar-width: none; /* Hide scrollbar for Firefox */
        }
        .tabs-container::-webkit-scrollbar { display: none; /* Hide scrollbar for Chrome */ }

        .tab-btn { 
            padding: 8px 18px; border-radius: 20px; border: 1px solid #ddd;
            background: #f8fafc; font-size: 13px; font-weight: 600; 
            cursor: pointer; transition: 0.3s; color: var(--text);
        }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Post Grid */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px 15px; }
        .post-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        
        /* Folders Content Control */
        .folder-content { display: none; animation: fadeIn 0.4s ease; }
        .folder-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Card Style */
        .post-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; margin-bottom: 20px; }
        .post-thumb { width: 100%; height: 150px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: white; }
        .post-info { padding: 15px; }
        .post-title { font-size: 1.1rem; font-weight: 700; margin: 0; color: var(--dark); }
        .post-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .price { font-weight: 800; font-size: 1.2rem; }
        .btn-get { background: var(--primary); color: white; text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: bold; }

        /* Bottom Nav */
        .mobile-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { text-decoration: none; color: #94a3b8; font-size: 10px; text-align: center; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        .whatsapp-float { position: fixed; bottom: 85px; right: 20px; background: #25d366; width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 999; }
    </style>
</head>
<body>

    <script>
        function openFolder(evt, folderName) {
            var i, content, tabs;
            
            // सब कंटेंट छुपाओ
            content = document.getElementsByClassName("folder-content");
            for (i = 0; i < content.length; i++) {
                content[i].style.display = "none";
            }

            // सब बटन से active क्लास हटाओ
            tabs = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tabs.length; i++) {
                tabs[i].className = tabs[i].className.replace(" active", "");
            }

            // अगर 'All' चुना है तो सब दिखाओ, वरना सिर्फ चुना हुआ फोल्डर
            if(folderName === 'all') {
                for (i = 0; i < content.length; i++) {
                    content[i].style.display = "block";
                }
            } else {
                document.getElementById(folderName).style.display = "block";
            }
            
            evt.currentTarget.className += " active";
        }
    </script>
